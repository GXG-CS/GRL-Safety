# BGRL Fine-Tuning (FT) config — unified across datasets
#
# Encoder is unfrozen, linear head trained end-to-end.
# Parameters reference BGRL original pretrain settings:
#   - lr: 5e-4 (mid-range of original 1e-5 ~ 5e-4 pretrain lr)
#   - weight_decay: 1e-5 (same as original pretrain)
#   - dropout: 0.2 (original has none; added for FT regularization)
#
# Architecture (must match pretrained checkpoint):
#   - GCN encoder: 768 → 768 → 768 (SBERT 768d input)
#   - Linear head: 768 → num_classes

# Architecture
--graph_encoder_layer=768
--graph_encoder_layer=768

# Training
--lr=5e-4
--weight_decay=1e-5
--dropout=0.2
--max_epochs=1000
--patience=200
