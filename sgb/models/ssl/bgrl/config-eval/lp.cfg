# BGRL Linear Probing (LP) config — unified across datasets
#
# Encoder is frozen, sklearn LogisticRegression trained on L2-normalized
# encoder representations. C selected via 5-point grid [0.01, 0.1, 1, 10, 100]
# on validation set (same as current eval_feature_noise.py).
#
# References BGRL original eval: LogReg with GridSearchCV over
# C = 2^{-10..10}, solver=liblinear, OvR. We simplify to lbfgs/multinomial
# with a smaller C grid for speed on large datasets (arxiv 169K nodes).
#
# Architecture (must match pretrained checkpoint):
#   - GCN encoder: 768 → 768 → 768 (SBERT 768d input)

# Architecture
--graph_encoder_layer=768
--graph_encoder_layer=768

# LP uses sklearn, no torch training params needed.
# The C grid and solver are hardcoded in the eval script.
