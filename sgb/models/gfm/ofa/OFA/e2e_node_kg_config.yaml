# GFM-Safety pretrain config — 8-task subset (node + link + KG).
# Omits chemblpre/chempcba/chemhiv because:
#   1. Downstream safety eval is node-classification only; chem-pretrain
#      signal does not transfer to node safety profile.
#   2. Chem datasets (180k+437k+41k molecules) blow past 96G host RAM.
# Keeps OFA's core inductive bias: prompt-graph + LM-projected class text
# + task-tree RGCN encoder jointly trained across heterogeneous graphs.

batch_size: 512
eval_batch_size: 256
dropout: 0.15
lr: 0.001
num_layers: 7
JK : "none"
task_names:
  - "cora_link"
  - "cora_node"
  - "pubmed_link"
  - "pubmed_node"
  - "arxiv"
  - "WN18RR"
  - "FB15K237"
  - "wikics"

d_multiple:
  - 1.5
  - 2
  - 0.5
  - 2.5
  - 0.7
  - 0.6
  - 0.4
  - 2

d_min_ratio:
  - 1
  - 1
  - 0.1
  - 2
  - 0.2
  - 0.1
  - 0.03
  - 1
